{% extends "layout.html" %} {%block css_style %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/create.css') }}"
/>
{% endblock %} {% block title %} Create Quizzes {% endblock %}
{% block content %}
<main>
  <div class="container">
    <h1>Create a new Quiz</h1>
  </div>
  <form method="POST" action="{{url_for('create')}}">
    <div class="form-group">
      <label for="title">Quiz Title</label>
      <input
        type="text"
        id="title"
        name="title"
        placeholder="Ex: History Quiz"
        required
      />
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" name="category" required>
        <option value="" selected>Select Category</option>
        {% for category in categories %}
        <option value="{{category}}">{{category}}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        name="description"
        rows="3"
        maxlength="148"
      ></textarea>
    </div>
    <div class="form-group">
      <label>Insert a Image URL (Optional)</label>
      <input
        type="text"
        name="image"
        placeholder="Ex: https://site.com/python.jpg"
      />
    </div>

    <h2>Question</h2>

    <div class="question-block">
      <div class="form-group">
        <label>Question type</label>
        <select name="question-type" class="question-type">
          <option value="multiple">Multiple Choices</option>
          <option value="boolean">True or False</option>
          <option value="text">Open Answer</option>
        </select>
      </div>

      <div class="form-group">
        <label>Question</label>
        <input
          type="text"
          id="question-text"
          class="question-input"
          placeholder="Type your question..."
          required
        />
      </div>

      <button type="button" class="btn btn-main" id="btn-add">
        Add Question
      </button>
    </div>
    <div id="questions-container"></div>
    <br /><br />
    <button type="submit" class="btn btn-save">Save Quiz</button>
  </form>
</main>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<script src="/static/js/script.js"></script>
{% endblock %}
