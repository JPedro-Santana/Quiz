{% extends "layout.html" %}

{%block css_style %} <link rel="stylesheet" href="{{ url_for('static', filename='css/create.css') }}"> {% endblock %}

{% block title %} Edit Quiz {% endblock %}

{% block content %}
<main>
<h1>Edit Quiz</h1>

<form method="POST">
<div class="form-group">
<label>Title</label>
<input type="text" name="title" value="{{ quiz.title }}" required>
</div>
<div class="form-group">
<label>Category</label>
<select name="category">
{% for category in categories %}
<option value="{{category}}"
{% if category == quiz.category %}
selected
{% endif %}>
{{category}}
</option>
{% endfor %}
</select>
</div>
<div class="form-group">
<label>Description</label>
<textarea name="description">{{quiz.description}}</textarea>
</div>
<button class="btn btn-save">Update Quiz</button>
</form>
</main>
{% endblock %}
