   {% extends "layout.html" %}

   {% block content %}
    <main>
        <h1>Create, share and solve quizzes!</h1>
        <p class="main-p">Create and play quizzes on any topic.</p>
        <a href="{{url_for('explore')}}"><button class="btn-main">Explore Quizzes</button></a>
        <a href="{{url_for('create')}}"><button class="btn-create">Create Quiz</button></a>
    </main>
    <section>
        <h2>Popular Quizzes</h2>
        <div class="quiz-container">
            {% for quiz in quizzes %}
            <div class="quiz-card">
                <img src="{{quiz.image}}" alt="{{quiz.title}}">
                <h3 class="title">{{quiz.title}}</h3>
                <p class="question-description">{{quiz.description}}</p>
                <a href="{{url_for('quiz_layout', id=quiz.id)}}"><button class="btn btn-solve">Solve Quiz</button></a>
            </div>
            {% endfor %}
        </div>
    </section>
    {% endblock %}
